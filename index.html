<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex Catcher</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8fafc;
      background: #020617;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      background:
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.35), transparent 22rem),
        radial-gradient(circle at 80% 10%, rgba(168, 85, 247, 0.25), transparent 20rem),
        #020617;
      touch-action: manipulation;
      user-select: none;
    }

    .game {
      width: min(100%, 28rem);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 1.5rem;
      overflow: hidden;
      background: rgba(15, 23, 42, 0.9);
      box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.45);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem;
      background: rgba(15, 23, 42, 0.78);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 6vw, 2.25rem);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, auto);
      gap: 0.35rem 0.75rem;
      color: #cbd5e1;
      font-size: 0.9rem;
      text-align: right;
    }

    .stat-value {
      color: #f8fafc;
      font-weight: 700;
    }

    .arena {
      position: relative;
      height: 28rem;
      max-height: 68vh;
      min-height: 22rem;
      background:
        linear-gradient(rgba(14, 165, 233, 0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14, 165, 233, 0.12) 1px, transparent 1px),
        rgba(2, 6, 23, 0.82);
      background-size: 2rem 2rem;
      cursor: crosshair;
    }

    .target {
      position: absolute;
      width: 4.5rem;
      aspect-ratio: 1;
      border: 0;
      border-radius: 999px;
      color: #082f49;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #67e8f9, #facc15);
      box-shadow: 0 0 2rem rgba(103, 232, 249, 0.45);
      transform: translate(-50%, -50%) scale(1);
      transition: transform 120ms ease, filter 120ms ease;
    }

    .target:active {
      transform: translate(-50%, -50%) scale(0.92);
      filter: brightness(1.15);
    }

    .panel {
      padding: 1rem;
      display: grid;
      gap: 0.8rem;
      background: rgba(15, 23, 42, 0.92);
    }

    .message {
      margin: 0;
      color: #cbd5e1;
      line-height: 1.5;
    }

    .start {
      border: 0;
      border-radius: 999px;
      padding: 0.9rem 1rem;
      color: #082f49;
      background: linear-gradient(135deg, #22d3ee, #bef264);
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="game" aria-labelledby="game-title">
    <section class="header">
      <h1 id="game-title">Codex Catcher</h1>
      <div class="stats" aria-live="polite">
        <span>Score</span><span class="stat-value" id="score">0</span>
        <span>Time</span><span class="stat-value"><span id="time">30</span>s</span>
      </div>
    </section>

    <section class="arena" id="arena" aria-label="Game area">
      <button class="target" id="target" type="button" aria-label="Catch the target">★</button>
    </section>

    <section class="panel">
      <p class="message" id="message">Tap Start, then catch as many stars as you can before time runs out.</p>
      <button class="start" id="start" type="button">Start Game</button>
    </section>
  </main>

  <script>
    const arena = document.querySelector('#arena');
    const target = document.querySelector('#target');
    const scoreLabel = document.querySelector('#score');
    const timeLabel = document.querySelector('#time');
    const message = document.querySelector('#message');
    const startButton = document.querySelector('#start');

    let score = 0;
    let timeLeft = 30;
    let timerId;
    let playing = false;

    function moveTarget() {
      const padding = target.offsetWidth / 2 + 8;
      const maxX = arena.clientWidth - padding;
      const maxY = arena.clientHeight - padding;
      const x = Math.random() * (maxX - padding) + padding;
      const y = Math.random() * (maxY - padding) + padding;

      target.style.left = `${x}px`;
      target.style.top = `${y}px`;
    }

    function endGame() {
      playing = false;
      clearInterval(timerId);
      startButton.disabled = false;
      startButton.textContent = 'Play Again';
      message.textContent = `Game over! You caught ${score} ${score === 1 ? 'star' : 'stars'}.`;
    }

    function startGame() {
      score = 0;
      timeLeft = 30;
      playing = true;
      scoreLabel.textContent = score;
      timeLabel.textContent = timeLeft;
      message.textContent = 'Go! Tap each star as quickly as you can.';
      startButton.disabled = true;
      moveTarget();

      timerId = setInterval(() => {
        timeLeft -= 1;
        timeLabel.textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    target.addEventListener('click', () => {
      if (!playing) {
        return;
      }

      score += 1;
      scoreLabel.textContent = score;
      moveTarget();
    });

    startButton.addEventListener('click', startGame);
    window.addEventListener('resize', moveTarget);
    moveTarget();
  </script>
</body>
